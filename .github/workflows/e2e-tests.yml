name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# FORCE_JAVASCRIPT_ACTIONS_TO_NODE24 silences the Node.js 20 deprecation warning
# in GitHub Actions (checkout, setup-node, upload-artifact).
# These actions use their own internal Node runtime — this does not affect the project's Node version.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      # --with-deps installs the system-level dependencies required by Chromium on Linux
      # (libglib, libnss, libatk, etc.) that are not pre-installed on ubuntu-latest
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # CI_MODE=true tells world.js to use CI-optimized browser options:
      # --no-sandbox, real User-Agent, 1920x1080 viewport, en-US locale
      - name: Run E2E tests
        run: npm test
        env:
          CI_MODE: true

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cucumber-report
          path: reports/
          # retention-days: how many days the artifact is kept on GitHub
          retention-days: 7
